server.port=9000

# Database URL (db name: s19d2)
spring.datasource.url=jdbc:postgresql://localhost:5432/s19d2
spring.datasource.username=postgres
spring.datasource.password=hello

# Hibernate and Schema Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Default schema name
spring.jpa.properties.hibernate.default_schema=bank

# Initial setup mode - try setting to 'never' if you have schema-h2.sql errors
spring.sql.init.mode=never